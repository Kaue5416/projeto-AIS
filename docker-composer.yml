services:

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    command: ["nginx", "-g", "daemon off;"]
    depends_on:
      - app1
      - app2
    networks:
      - rede-interna

  app1:
    image: nginx:alpine
    container_name: app1
    volumes:
      - ./app/app1:/usr/share/nginx/html
    networks:
      - rede-interna

  app2:
    image: nginx:alpine
    container_name: app2
    volumes:
      - ./app/app2:/usr/share/nginx/html
    networks:
      - rede-interna

  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rede-interna

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - rede-interna

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - rede-interna

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - -nginx.scrape-uri=http://nginx-lb/status
    ports:
      - "9113:9113"
    networks:
      - rede-interna
    depends_on:
      - nginx

networks:
  rede-interna:
    driver: bridge

volumes:
  postgres_data: