global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:80"]

  - job_name: "app1"
    static_configs:
      - targets: ["app1:3000"]

  - job_name: "app2"
    static_configs:
      - targets: ["app2:3000"]